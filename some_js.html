<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    * {box-sizing: border-box;}
    .buttonDiv {
      width: 80px; 
      height: 40px; 
      border-radius: 10px;
      margin: 5px;
      font-size: x-small;
    }
    p {
      font-family: Arial, Helvetica, sans-serif;
    }
    #snackbar {
      visibility: hidden; /* Hidden by default. Visible on click */
      min-width: 250px; /* Set a default minimum width */
      margin-left: -125px; /* Divide value of min-width by 2 */
      background-color: #333; /* Black background color */
      color: #fff; /* White text color */
      text-align: center; /* Centered text */
      border-radius: 2px; /* Rounded borders */
      padding: 16px; /* Padding */
      position: fixed; /* Sit on top of the screen */
      z-index: 1; /* Add a z-index if needed */
      left: 50%; /* Center the snackbar */
      bottom: 30px; /* 30px from the bottom */
    }
    /* Show the snackbar when clicking on a button (class added with JavaScript) */
    #snackbar.show {
      visibility: visible; /* Show the snackbar */
    }
    .inputWithCopyWrapper {
      position: relative;
      display: inline;
    }
    .inputWithCopyWrapper input {
      height: 22px;
    }
    .inputWithCopyWrapper button {
      position: absolute;
      top: -2px;
      right: -16px;
      width: 40px;
      height: 22px;
    }
    .section {
      padding: 30px; 
      border-style: solid; 
      border-width: 1px;
      border-color: gray;
      margin-bottom: 8px;
      position: relative;
    }
  </style>

</head>
<body>
  <!-- The copypasta snackbar -->
  <div id="snackbar">Copied</div>

  <!-- General URL input -->
  <section class="section">
    <input type="text" id="generalUrl" placeholder="Ticket URL..." size="80" oninput="generalUrl_oninput()">
    <div class="inputWithCopyWrapper">
      <input type="text" readonly id="generalUrl_ticketNumber">
      <button onclick="inputCopy('generalUrl_ticketNumber')">&#x2398;</button>
    </div>
    <div style="margin-top: 8px;">
      <input type="text" id="ticketSummary" placeholder="Ticket summary..." size="80">
    </div>
    <div style="margin-top: 8px;">
      <textarea rows="2" cols="83" style="resize: none;" id="excelComment"></textarea>
    </div>

    <!-- Copy to my / their excel -->
    <div>
      <button class="buttonDiv" onclick="copypasta_copyToMyExcel()">Copy to my Excel</button>
      <button class="buttonDiv" onclick="copypasta_copyToTheirExcel()">Copy to their Excel</button>
    </div>

    <select name="status" id="ticketStatusDropdown">
      <option value="resolved">resolved</option>
      <option value="waiting">waiting</option>
      <option value="transferred">transferred</option>
      <option value="inprog">inprog</option>
      <option value="queued">queued</option>
      <option value="assist">assist</option>
      <option value="hold">hold</option>
      <option value="vendor">vendor</option>
    </select>

    <select name="source" id="ticketSourceDropdown">
      <option value="MemoReg queue">MemoReg queue</option>
      <option value="Email">Email</option>
      <option value="Backdesk queue">Backdesk queue</option>
      <option value="Hardware queue">Hardware queue</option>
      <option value="transferred to Backdesk">transferred to Backdesk</option>
    </select>

  </section>

  <section class="section">
    <!-- Generic E-form copypasta -->
    <div>
      <button class="buttonDiv" onclick="eformHandledCopypasta()">E-form handled</button>
    </div>

    <!-- SITA E-form copypasta -->
    <div>
      <input type="text" id="siteEformCopypasta_hlinput" placeholder="HLSUPPORT">
      <button class="buttonDiv" onclick="sitaEformHandledCopypasta()">SITA E-form handled</button>
    </div>

    <!-- Generic E-form with ticket number copypasta -->
    <div>
      <input type="text" id="eformWithNumberCopypasta_hlinput" placeholder="HLSUPPORT">
      <button class="buttonDiv" onclick="eformWithNumberHandledCopypasta()">E-form handled with number</button>
    </div>
  </section>

  <section class="section">
    <h4 style="position: absolute; top: -20px; left: 1px;">Mailboxes copypasta</h4>
    <input type="text" placeholder="alias" id="mailboxesCopypasta_alias">
    <textarea 
      style="resize: none;" rows="8" cols="20" placeholder="users" id="mailboxesCopypasta_users" 
      onchange="mailboxesCopypasta.textareaOnchange()"></textarea>
    <button onclick="mailboxesCopypasta.getCopyPasta()">Craft & copy</button>
    <p style="font-size: small;" id="mailboxesCopypasta_usersGotList"></p>
    
    <div style="display: flex;">
      <button class="buttonDiv" onclick="mailboxesCopypasta.getCopypasta_grantFullAccessNoAutomapping()">Grant Full Access w/o Automapping</button>
      <button class="buttonDiv" onclick="mailboxesCopypasta.getCopypasta_grantFullAccessWithAutomapping()">Grant Full Access with Automapping</button>
      <button class="buttonDiv" onclick="mailboxesCopypasta.getCopyPasta_revokeFullAccess()">Revoke Full Access</button>
      <button class="buttonDiv" onclick="mailboxesCopypasta.getCopyPasta_grandSendAsOnprem()">Grant Send As on-prem</button>
      <button class="buttonDiv" onclick="mailboxesCopypasta.getCopyPasta_grandSendAsCloud()">Grant Send As cloud</button>
      <button class="buttonDiv" onclick="mailboxesCopypasta.getCopyPasta_revokeSendAsOnprem()">Revoke Send As on-prem</button>
      <button class="buttonDiv" onclick="mailboxesCopypasta.getCopyPasta_revokeSendAsCloud()">Revoke Send As cloud</button>
      <button class="buttonDiv" onclick="mailboxesCopypasta.getCopyPasta_grantSendOnBehalf()">Grant Send On Behalf</button>
      <button class="buttonDiv" onclick="mailboxesCopypasta.getCopyPasta_revokeSendOnBehalf()">Revoke Send On Behalf</button>
    </div>

    <div>
      <textarea id="mailboxesCopypasta_commandResultViewWindow"
        rows="12" placeholder="commands will appear here..." style="width: 90%; resize: vertical;"></textarea>
    </div>

  </section>









  <script>
    //
    //  GLOBALS AND FUNCTIONS
    //
    const constDate = new Date();
    let generalUrl_ticketNumber = document.getElementById("generalUrl_ticketNumber");
    generalUrl_ticketNumber.addEventListener('focus', () => generalUrl_ticketNumber.select());

    //
    //  OBJECTS SECTION
    //
    /* mailboxesCopypasta */
    let mailboxesCopypasta = {
      textarea: document.getElementById("mailboxesCopypasta_users"),
      foundUsers: document.getElementById("mailboxesCopypasta_usersGotList"),
      aliasInput: document.getElementById("mailboxesCopypasta_alias"),
      viewWindow: document.getElementById("mailboxesCopypasta_commandResultViewWindow"),
      filteredUsersArray: [],
      readableList: "",
      grantFullAccessNoAutomapping: "",
      grantFullAccessWithAutomapping: "",
      revokeFullAccess: "",
      grandSendAsOnprem: "",
      grandSendAsCloud: "",
      revokeSendAsOnprem: "",
      revokeSendAsCloud: "",
      grantSendOnBehalf: "",
      revokeSendOnBehalf: "",

      getUsersArray: function getUsersArray() {
        users = this.textarea.value.trim();
        users = users.replaceAll(",", "");
        users = users.replaceAll(".", "");
        let usersArray = users.split(" ");
        this.filteredUsersArray.splice(0, this.filteredUsersArray.length);
        usersArray.forEach(element => {
          if (element && element.length > 0) {
            this.filteredUsersArray.push(element);
          }
        });
      },

      getUsersAsReadableList: function getUsersAsReadableList() {
        this.readableList = "";
        this.filteredUsersArray.forEach(element => {
          this.readableList += "\"" + element + "\" ";
        });
        this.readableList.trim();
      },

      writeFilteredUsers: function writeFilteredUsers() {
        this.foundUsers.innerHTML = this.readableList;
      },

      textareaOnchange: function textareaOnchange() {
        this.getUsersArray();
        this.getUsersAsReadableList();
        this.writeFilteredUsers();
      },

      getCopyPasta: function getCopyPasta() {
        let generatedText;
        let alias = this.aliasInput.value.trim();
        
        if (this.filteredUsersArray.length > 1) {
          generatedText = "Users ";
          this.filteredUsersArray.forEach(element => {  
            generatedText += element + ", ";
          })
          generatedText = generatedText.slice(0, generatedText.length - 2);
          generatedText += " were added to the " + alias + " mailbox.";
        } else {
          generatedText = "User " + this.filteredUsersArray[0] + " was added to the " + alias + " mailbox.";
        }
        console.log(generatedText);
        
        navigator.clipboard.writeText(generatedText);
        showSnackbar();
      },

      getCopypasta_grantFullAccessNoAutomapping() {
        let alias = this.aliasInput.value.trim();
        this.grantFullAccessNoAutomapping = "";
        this.filteredUsersArray.forEach((user) => {
          this.grantFullAccessNoAutomapping += `Add-MailboxPermission -Identity '${alias}' -User '${user}' -AccessRights 'FullAccess' -AutoMapping:$false -Confirm:$false\r\n`;
        })
        this.viewWindow.value = this.grantFullAccessNoAutomapping;
        navigator.clipboard.writeText(this.grantFullAccessNoAutomapping);
        showSnackbar();
      },

      getCopypasta_grantFullAccessWithAutomapping() {
        let alias = this.aliasInput.value.trim();
        this.grantFullAccessWithAutomapping = "";
        this.filteredUsersArray.forEach((user) => {
          this.grantFullAccessWithAutomapping += `Add-MailboxPermission -Identity '${alias}' -User '${user}' -AccessRights 'FullAccess' -AutoMapping:$true -Confirm:$false\r\n`;
        });
        this.viewWindow.value = this.grantFullAccessWithAutomapping;
        navigator.clipboard.writeText(this.grantFullAccessWithAutomapping);
        showSnackbar();
      },

      getCopyPasta_revokeFullAccess() {
        let alias = this.aliasInput.value.trim();
        this.revokeFullAccess = "";
        this.filteredUsersArray.forEach((user) => {
          this.revokeFullAccess += `Remove-MailboxPermission -Identity '${alias}' -User '${user}' -AccessRights 'FullAccess' -Confirm:$false\r\n`;
        });
        this.viewWindow.value = this.revokeFullAccess;
        navigator.clipboard.writeText(this.revokeFullAccess);
        showSnackbar();
      },

      getCopyPasta_grandSendAsOnprem() {
        let alias = this.aliasInput.value.trim();
        this.grandSendAsOnprem = "";
        this.filteredUsersArray.forEach((user) => {
          this.grandSendAsOnprem += `Get-Mailbox '${alias}' | Add-ADPermission -User '${user}' -ExtendedRights 'Send As' -Confirm:$false\r\n`;
        });
        this.viewWindow.value = this.grandSendAsOnprem;
        navigator.clipboard.writeText(this.grandSendAsOnprem);
        showSnackbar();
      },

      getCopyPasta_grandSendAsCloud() {
        let alias = this.aliasInput.value.trim();
        this.grandSendAsCloud = "";
        this.filteredUsersArray.forEach((user) => {
          this.grandSendAsCloud += `Add-RecipientPermission '${alias}' -Trustee '${user}' -AccessRights 'SendAs' -confirm:$false\r\n`;
        });
        this.viewWindow.value = this.grandSendAsCloud;
        navigator.clipboard.writeText(this.grandSendAsCloud);
        showSnackbar();
      },

      getCopyPasta_revokeSendAsOnprem() {
        let alias = this.aliasInput.value.trim();
        this.revokeSendAsOnprem = "";
        this.filteredUsersArray.forEach((user) => {
          this.revokeSendAsOnprem += `Get-Mailbox '${alias}' | Remove-ADPermission -User '${user}' -ExtendedRights 'Send As' -confirm:$false\r\n`;
        });
        this.viewWindow.value = this.revokeSendAsOnprem;
        navigator.clipboard.writeText(this.revokeSendAsOnprem);
        showSnackbar();
      },

      getCopyPasta_revokeSendAsCloud() {
        let alias = this.aliasInput.value.trim();
        this.revokeSendAsCloud = "";
        this.filteredUsersArray.forEach((user) => {
          this.revokeSendAsCloud += `Remove-RecipientPermission '${alias}' -Trustee '${user}' -AccessRights 'SendAs' -confirm:$false\r\n`;
        });
        this.viewWindow.value = this.revokeSendAsCloud;
        navigator.clipboard.writeText(this.revokeSendAsCloud);
        showSnackbar();
      },

      getCopyPasta_grantSendOnBehalf() {
        let alias = this.aliasInput.value.trim();
        this.grantSendOnBehalf = "";
        this.filteredUsersArray.forEach((user) => {
          this.grantSendOnBehalf += `Set-Mailbox '${alias}' -Grantsendonbehalfto @{add='${user}'} -confirm:$false\r\n`;
        });
        this.viewWindow.value = this.grantSendOnBehalf;
        navigator.clipboard.writeText(this.grantSendOnBehalf);
        showSnackbar();
      },

      getCopyPasta_revokeSendOnBehalf() {
        let alias = this.aliasInput.value.trim();
        this.revokeSendOnBehalf = "";
        this.filteredUsersArray.forEach((user) => {
          this.revokeSendOnBehalf += `Set-Mailbox '${alias}' -Grantsendonbehalfto @{remove='${user}'} -confirm:$false\r\n`;
        });
        this.viewWindow.value = this.revokeSendOnBehalf;
        navigator.clipboard.writeText(this.revokeSendOnBehalf);
        showSnackbar();
      },
    }

    //
    //  FUNCTIONS
    //
    function showSnackbar() {
      var x = document.getElementById("snackbar");
      x.className = "show";
      // After 3 seconds, remove the show class from DIV
      setTimeout(function(){ x.className = x.className.replace("show", ""); }, 400);
    } 

    function inputCopy(inputId) {
      let x = document.getElementById(inputId).value;
      navigator.clipboard.writeText(x);
      showSnackbar();
    }

    function generalUrl_oninput() {
      let x = document.getElementById("generalUrl").value;
      let reg = /HLSUPPORT-\d*/i;
      var matches = x.match(reg);
      if (matches.length) {
        document.getElementById("generalUrl_ticketNumber").value = matches[0];
        document.getElementById("siteEformCopypasta_hlinput").value = matches[0];
        document.getElementById("eformWithNumberCopypasta_hlinput").value = matches[0];
      }
    }
    
    function eformHandledCopypasta() {
      navigator.clipboard.writeText(
        "-------------------------\r\nRequest has been handled.\r\n\r\nKind regards\r\nMarcin Kazmierczak\r\nITSD Hapag Lloyd\r\n-------------------------"
      );
      showSnackbar();
    }

    function sitaEformHandledCopypasta() {
      let x = document.getElementById("siteEformCopypasta_hlinput").value;
      let reg = /HLSUPPORT-\d*/i;
      var matches = x.match(reg);
      navigator.clipboard.writeText(
        "-------------------------\r\nRequest has been forwarded to SITA in "+matches[0].toUpperCase()+".\r\n\r\nKind regards\r\nMarcin Kazmierczak\r\nITSD Hapag Lloyd\r\n-------------------------"
      );
      showSnackbar();
    }

    function eformWithNumberHandledCopypasta() {
      let x = document.getElementById("eformWithNumberCopypasta_hlinput").value;
      let reg = /HLSUPPORT-\d*/i;
      var matches = x.match(reg);
      navigator.clipboard.writeText(
        "-------------------------\r\nRequest has been handled in "+matches[0].toUpperCase()+".\r\n\r\nKind regards\r\nMarcin Kazmierczak\r\nITSD Hapag Lloyd\r\n-------------------------"
      );
      showSnackbar();
    }
    
    function copypasta_copyToMyExcel() {
      let url = document.getElementById("generalUrl").value;
      let summary = document.getElementById("ticketSummary").value;
      let status = document.getElementById("ticketStatusDropdown").value;
      if (status == "hold") {status = "waiting";}
      if (status == "vendor") {status = "waiting";}
      let comment = document.getElementById("excelComment").value;
      navigator.clipboard.writeText(`${url}\t${summary}\t${status}\t${comment}`);
      showSnackbar();
    }

    function copypasta_copyToTheirExcel() {
      // Generate date
      let hours = constDate.getHours();
      let year = constDate.getFullYear();
      let month = hours < 6 && constDate.getDate() == 1 ? constDate.getMonth() : constDate.getMonth() + 1;
      let day = hours < 6 ? constDate.getDate() - 1 : constDate.getDate();
      
      day = day.toString().padStart(2, '0');
      month = month.toString().padStart(2, '0');

      let ticketNumber = document.getElementById("generalUrl_ticketNumber").value;
      let date = `${year}.${month}.${day}`;
      let summary = document.getElementById("ticketSummary").value;
      let source = document.getElementById("ticketSourceDropdown").value;
      let status = document.getElementById("ticketStatusDropdown").value;
      if (status == "resolved") {status = "Resolved.";}
      if (status == "waiting") {status = "Waiting for customer";}
      if (status == "transferred") {status = "Transferred";}
      if (status == "inprog") {status = "In progres";}
      if (status == "queued") {status = "Open";}
      if (status == "assist") {status = "In progres";}
      if (status == "hold") {status = "Hold";}
      if (status == "vendor") {status = "Pending on Vendor";}
      let comment = document.getElementById("excelComment").value;
      navigator.clipboard.writeText(`${ticketNumber}\t${date}\t${summary}\t${source}\t${status}\t${comment}`);
      showSnackbar();
    }
  </script>
</body>
</html>
