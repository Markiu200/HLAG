<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tests</title>
</head>
<body onload="load_f()">
  <script>
    function load_f() {
      console.log("load done")
      addElement()
    }
    function addElement() {
      const elem = document.createElement("p")
      elem.id = "the_element";
      elem.innerHTML = "Appended P"
      document.body.appendChild(elem)
    }



    registered_modules = {
      text: [
        {id: 0, data: {nodes: ["Text P 1", "Text P 2", "Text P 3"]}, meta: null},
        {id: 1, data: {nodes: ["Paragraph P 1", "Paragraph P 2", "Paragraph P 3"]}, meta: null},
        {id: 2, data: {nodes: ["Words P 1", "Words P 2", "Words P 3"]}, meta: null},
      ]
    }

    class TextModuleManager {
      static name = "text";
      // trzymamy instancje {id: ..., instance: ...}
      static instances = [];

      static getInstance(id) {
        let found = TextModuleManager.instances.find((element) => {return element.id == id});
        if (found) {
          return found.instance;
        } else {
          return TextModuleManager.createInstance(id);
        }
      }

      static createInstance(id) {
        // todo: proper fetch from contentmanager
        let pyLoad = registered_modules[TextModuleManager.name].find((element) => {return element.id == id});
        if (!pyLoad) {
          throw new Error("Instance ID "+id+" of "+TextModuleManager.name+" module is not registered!");
        }
        let node = TextModuleManager.generate(pyLoad.data, pyLoad.meta);
        let newInstance = {id: id, instance: node};
        TextModuleManager.instances.push(newInstance);
        return newInstance.instance;
      }

      static generate(data, meta) {
        let root = document.createElement("div");
        data.nodes.forEach(element => {
          let newP = document.createElement("p");
          newP.innerHTML = element;
          root.appendChild(newP);
        });
        return root;
      }
    }


    console.log(TextModuleManager.instances)
    for (i=0;i<3;i++) {
      let instance = TextModuleManager.getInstance(i)
      console.log(instance)
      document.body.appendChild(instance)
    }

    


  </script>
</body>
</html>
