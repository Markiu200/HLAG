  <main id="main"></main>
  <script>
    function load_f() {}


    // Navigation class
    class Navigation {
      // trzymamy windows z glownego
      static requestedWindows = [];

      static requestWindow(windowId) {
        let found = windows.find((element) => {return element.id == windowId});
        ContentManager.openWindow(found);
        Navigation.requestedWindows.push(found);
      }

      static dismissWindow(windowId) {
        let found = windows.find((element) => {return element.id == windowId});
        let index = Navigation.requestedWindows.indexOf(found);
        ContentManager.closeWindow(found);
        Navigation.requestedWindows.splice(index, 1);
      }
    }


    // ContentManager class
    class WindowContainer {
      constructor(title) {
        this.window = document.createElement("div");
        this.titlebar = document.createElement("div");
        this.content = document.createElement("div");
        this.window.style.border = "1px solid black";
        this.titlebar.style.borderBottom = "1px solid black";
        this.titlebar.innerHTML = title;
        this.window.appendChild(this.titlebar);
        this.window.appendChild(this.content);
      }

      hideTitlebar() {
        this.titlebar.style.display = "none";
      }

      showTitlebar() {
        this.titlebar.style.display = "initial";
      }
    }

    class ContentWindow {
      constructor(id, title=null) {
        this.id = id;
        this.title = title;
        this.instances = [];
        this.window = new WindowContainer(this.title);
        // TEMPORARY
        this.window.hideTitlebar();
      }
      
      open() {
        let content = this.window.content;
        this.instances.forEach((instance) => {
          instance.open();
          content.appendChild(instance.node);
        })
        ContentManager.main.appendChild(this.window.window);
      }

      close() {
        // todo close all instances, remove them from main
      }
    }

    class ContentManager {
      static main = document.getElementById("main");
      // navigation zna zarequestowane okienka, content manager trzyma ich zawartosc (ContentWindow)
      static openedWindows = [];
      static createdWindows = [];

      static getInstance(module, id) {
        let manager = moduleMap.find((el) => {return el.name == module;});
        if (!manager) {throw new Error("Manager for module "+module+" not found.")}
        let instance = manager.manager.getInstance(id);
        if (instance) {return instance;}
        throw new Error("Module "+module+" did not return instance "+id);
      }

      static createWindow(windowJSON) {
        let newWindow = new ContentWindow(windowJSON.id, windowJSON.title);
          newWindow.title = windowJSON.title;
          windowJSON.contents.forEach((element) => {
            newWindow.instances.push(ContentManager.getInstance(element.module, element.id));
          });
        ContentManager.createdWindows.push(newWindow);
        return newWindow;
      }

      static openWindow(windowJSON) {
        let window = ContentManager.createdWindows.find((element) => {return element.id == windowJSON.id;});
        if (!window) {
          window = ContentManager.createWindow(windowJSON);
        }
        let isOpened = ContentManager.openedWindows.find((element) => {return element == window;});
        if (isOpened) {
          console.log("Window "+windowJSON.id+" appears to be already opened.");
        } else {
          window.open();
          ContentManager.openedWindows.push(window);
        }
      }

      static closeWindow(windowJSON) {
        // todo close windows
      }
    }


    // Reference resolving class
    class ReferenceResolver {
      // todo bede musial uwzgledni JSREF i JSDICT - jako ze slownikowe wyszukiwania at runtime beda tez potrzebne
      // dla niektorych aplikacji
      // todo w dodatku uwzglednic znak specjalny zeby zapobiec przypadkowym uzyciom w kodzie
      static re = /JSREF\((.*?),(.*?)\)/;

      static contains_ref(line) {
        return (ReferenceResolver.re).test(line);
      }

      static resolve(jsref) {
        // jezeli JSREF wyglada tak: JSREF(module,id)
        let found = jsref.match(ReferenceResolver.re);
        if (!found) {
          return false;
        }
        let key = found[1];
        let value = found[2];
        // if (key == "mod") {
        return ReferenceResolver.resolve_mod(key, parseInt(value))
        //}
      }

      static resolve_mod(module, id) {
        return ContentManager.getInstance(module, id);
      }
    }


    //
    //    USER WRITTEN
    //
    // TextModuleManager and TextModule class
    class TextModuleInstance {
      constructor(id, node) {
        this.id = id
        this.node = node
        this.nestedInstances = []
      }
      open() {
        console.log("Text instance opened");
        this.nestedInstances.forEach((instance) => {
          instance.open()
        })
      }
      close() {}
    }

    class TextModuleManager {
      static name = "text";
      // trzymamy instancje we wlasnych klasach
      static instances = [];

      static getInstance(id) {
        let foundInstance = TextModuleManager.instances.find((element) => {return element.id == id});
        if (foundInstance) {
          console.log("returning exisitng instance...")
          return foundInstance;
        } else {
          console.log("generating new instance...");
          let createdInstance = TextModuleManager.createInstance(id);
          TextModuleManager.instances.push(createdInstance);
          return createdInstance;
        }
      }

      static createInstance(id) {
        // todo: proper fetch from contentmanager
        let instanceJSON = registered_modules[TextModuleManager.name].find((element) => {return element.id == id});
        if (!instanceJSON) {
          throw new Error("Instance ID "+id+" of "+TextModuleManager.name+" module is not registered!");
        }
        let newInstance = new TextModuleInstance(id, null);
        TextModuleManager.generate(instanceJSON.data, instanceJSON.meta, newInstance);
        return newInstance;
      }

      static generate(data, meta, instance) {
        let root = document.createElement("div");
        data.nodes.forEach(element => {
          if (ReferenceResolver.contains_ref(element)) {
            // assuming Py part separated refs from rest of the text
            // todo more universal way
            let nestedInstance = ReferenceResolver.resolve(element);
            root.appendChild(nestedInstance.node);
            instance.nestedInstances.push(nestedInstance);
          } else {
            let newP = document.createElement("p");
            newP.innerHTML = element;
            root.appendChild(newP);
          }
        });
        instance.node = root;
      }
    }


    // Data
    // This is done by PyCM
    let registered_modules = {
      text: [
        {id: 0, data: {nodes: ["Text P 1", "Text P 2", "Text P 3"]}, meta: null},
        {id: 1, data: {nodes: ["Paragraph P 1", "Paragraph P 2", "Paragraph P 3"]}, meta: null},
        {id: 2, data: {nodes: ["Words P 1", "Words P 2", "Words P 3"]}, meta: null},
        {id: 3, data: {nodes: ["Writings before reference", "JSREF(text,4)", "Writings after reference"]}, meta: null},
        {id: 4, data: {nodes: ["Inserted as reference"]}, meta: null},
      ]
    }
    // This could be done by PySS, if we decide to get it involved this much
    let moduleMap = [
      {name: "text", manager: TextModuleManager}
    ];
    // This is done by PyNav
    let windows = [
      {id: 0, title: "Home", contents: [{module: "text", id: 0}, {module: "text", id: 2}]},
      {id: 1, title: "Data", contents: [{module: "text", id: 1}]},
      {id: 2, title: "Referenced", contents: [{module: "text", id: 3}]},
    ]
