<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Newfluence</title><style>

* {box-sizing: border-box;}
body {
    display: flex;
}
.buttonDiv {
    width: 80px; 
    height: 40px; 
    border-radius: 10px;
    margin: 5px;
    font-size: x-small;
}
p {
    font-family: Arial, Helvetica, sans-serif;
}

main {
    float: left;
    width: 100%;
}
#snackbar {
    visibility: hidden; /* Hidden by default. Visible on click */
    min-width: 250px; /* Set a default minimum width */
    margin-left: -125px; /* Divide value of min-width by 2 */
    background-color: #333; /* Black background color */
    color: #fff; /* White text color */
    text-align: center; /* Centered text */
    border-radius: 2px; /* Rounded borders */
    padding: 16px; /* Padding */
    position: fixed; /* Sit on top of the screen */
    z-index: 1; /* Add a z-index if needed */
    left: 50%; /* Center the snackbar */
    bottom: 30px; /* 30px from the bottom */
}
#snackbar.show {
    visibility: visible; /* Show the snackbar */
}
.inputWithCopyWrapper {
    position: relative;
    display: inline;
}
.inputWithCopyWrapper input {
    height: 22px;
}
.inputWithCopyWrapper button {
    position: absolute;
    top: -2px;
    right: -16px;
    width: 40px;
    height: 22px;
}
.section {
    padding: 30px; 
    border-style: solid; 
    border-width: 1px;
    border-color: gray;
    margin-bottom: 8px;
    position: relative;
}

/* Copypastas */
.copypastas__mailboxes__input-panel {
    display: flex;
}
.copypastas__mailboxes__input-panel__button-grid {
    display: grid;
    border: 1px solid #ccc;
    grid-template-columns: 1fr 1fr 1fr 1fr;
}
.copypastas__mailboxes__input-panel__text__textarea {
    resize: horizontal;
    height: 99%;
}
.copypastas__mailboxes__input-panel__button-grid__row-title {
    font-family: Arial, Helvetica, sans-serif;
    font-weight: bold;
    padding-right: 15px;;
    text-align: right;
    vertical-align: middle;
}
.copypastas__mailboxes__input-panel__button-grid__button {
    display: inline-block;
    background-color: #f1f1f1;
    border: none;
    outline: none;
    cursor: pointer;
    height: 50px;
}
.copypastas__mailboxes__input-panel__button-grid__row-title.grant {background-color: #d1ffe6;}
.copypastas__mailboxes__input-panel__button-grid__row-title.revoke {background-color: #ffd1d1;}
.copypastas__mailboxes__input-panel__button-grid__button:hover {
    background-color: #ddd;
}
.copypastas__mailboxes__input-panel__button-grid__button.active {
    background-color: #ccc;
}
.copypastas__mailboxes__input-panel__button-grid__alias-window {
    grid-column: 1 / span 2;
}
.copypastas__mailboxes__output-panel__users {
    font-size: small;
    border: #8F8F9D 1px solid;
    padding: 2px;
}
.copypastas__mailboxes__output-panel__commands {
    width: 100%; 
    resize: vertical;
}
.copypastas__mailboxes__output-panel__message {
    width: 100%;
    resize: none;
}
nav {
    position: fixed;
    width: 200px;
    height: 98%;
    border-style: solid;
    border-width: 1px;
}
nav button.active {
    background-color: #ffd1d1;
}
.hidden {
  display: none !important;
}
.nav_button_expand.hidden {
  display: none !important;
}
.nav_button_expand.hidden * {
  display: none !important;
}

/* SiteNavigation */
.nav_button_item {
  display: flex;
}
.nav_button_nonexpandable_spacing {
  background-color: #333;
  width: 20px;
  display: inline-block;
}
.js-nav-button {
  flex-grow: 100;
}
.nav_button_expand {
  background-color: #333;
  color: #f1f1f1;
  text-align: center;
  user-select: none;
  width: 20px;
}
.nav_button_expand.active {
  background-color: #8F8F9D;
}
.nav__nested--1{
  padding-left: 10px;
}
</style>
</head>
<body>
  <nav class="js-site-navigation">
    <button class="js-site-navigation-showall">Show all</button>
    <div class="js-for-020_ticket_tracker nav_button_item">
      <div class="nav_button_nonexpandable_spacing"></div><button class="js-nav-button">Ticket Tracker</button>
    </div>
    <div class="js-for-025_copypastas nav_button_item">
      <div class="nav_button_nonexpandable_spacing"></div><button class="js-nav-button">Copypastas</button>
    </div>
    <!-- our first expandable-->
    <div class="js-for-030_exchange nav_button_item">
      <div class="nav_button_expand js-nav-expandable">v</div><button class="js-nav-button">Exchange</button>
    </div>
    <!-- nested items starts here-->
    <div class="js-for-030_exchange-010_basic_troubleshooting nav_button_item nav__nested--1">
      <div class="nav_button_nonexpandable_spacing"></div><button class="js-nav-button">Basic Troubleshooting</button>
    </div>
    <div class="js-for-030_exchange-015_exchange_2 nav_button_item nav__nested--1">
      <div class="nav_button_nonexpandable_spacing"></div><button class="js-nav-button">Exchange 2</button>
    </div>  
    <div class="js-for-030_exchange-020_exchange_3 nav_button_item nav__nested--1">
      <div class="nav_button_nonexpandable_spacing"></div><button class="js-nav-button">Exchange 3</button>
    </div>
    <!-- nested items ends here-->
    <div class="js-for-032_active_directory nav_button_item">
      <div class="nav_button_expand js-nav-expandable">v</div><button class="js-nav-button">Active Directory</button>
    </div>
    <!-- new nest-->
    <div class="js-for-032_active_directory-010_ad_groups nav_button_item nav__nested--1">
      <div class="nav_button_nonexpandable_spacing"></div><button class="js-nav-button">AD Groups</button>
    </div>
    <!-- end nest -->
  </nav>

  <div style="float: left; width: 240px; height: 100%;"></div><main>

<main>
  <section id="020_ticket_tracker">
    <p>"020_ticket_tracker"</p>
  </section>

  <section id="025_copypastas">
    <p>"025_copypastas"</p>
  </section>

  <section id="030_exchange-010_basic_troubleshooting">
    <p>"030_exchange-010_basic_troubleshooting"</p>
  </section>
  
  <section id="030_exchange-015_exchange_2">
    <p>"030_exchange-015_exchange_2"</p>
  </section>
  
  <section id="030_exchange-020_exchange_3">
    <p>"030_exchange-020_exchange_3"</p>
  </section>

  <section id="030_exchange">
    <!-- empty -->
  </section>
  
  <section id="032_active_directory-010_ad_groups">
    <p>"032_active_directory-010_ad_groups"</p>
  </section>
  
  <section id="032_active_directory">
    <p>"032_active_directory"</p>
  </section>
</main>

  <script>
    // NAMESPACE SiteNavigation
    class SiteNavigation {
      static Navigation = class Navigation {
        static NavItem = class NavItem {
          constructor(buttonClass, articleId, children=null, active=false) {
            this.buttonClass = buttonClass;
            this.buttonDiv = document.getElementsByClassName(buttonClass)[0];
            this.button = this.buttonDiv.children[1];
            this.articleId = articleId;
            this.correspondingArticle = document.getElementById(articleId);
            this.active = active;
            if (active == true) {
              this.button.classList.add("active");
              this.correspondingArticle.classList.remove("hidden");
            } else {
              this.correspondingArticle.classList.add("hidden");
            }
            if (children == null) {
              this.children = [];
            } else {
              this.children = children;
            }
          } // constructor
        } // NavItem
        //
        constructor() { //constructor for Navigation class
          this.navigationContainer = document.querySelector(".js-site-navigation");
          this.allButtons = this.navigationContainer.querySelectorAll(".js-nav-button");
          this.allExpandButtons = this.navigationContainer.querySelectorAll(".js-nav-expandable");
          this.showAllButton = this.navigationContainer.querySelector(".js-site-navigation-showall");
          this.navigationButtons = [
            new SiteNavigation.Navigation.NavItem("js-for-020_ticket_tracker", "020_ticket_tracker", null, true),
            new SiteNavigation.Navigation.NavItem("js-for-025_copypastas", "025_copypastas"),
            new SiteNavigation.Navigation.NavItem("js-for-030_exchange", "030_exchange", [
              new SiteNavigation.Navigation.NavItem("js-for-030_exchange-010_basic_troubleshooting", "030_exchange-010_basic_troubleshooting"),
              new SiteNavigation.Navigation.NavItem("js-for-030_exchange-015_exchange_2", "030_exchange-015_exchange_2"),
              new SiteNavigation.Navigation.NavItem("js-for-030_exchange-020_exchange_3", "030_exchange-020_exchange_3"),
            ]),
            new SiteNavigation.Navigation.NavItem("js-for-032_active_directory", "032_active_directory", [
              new SiteNavigation.Navigation.NavItem("js-for-032_active_directory-010_ad_groups", "032_active_directory-010_ad_groups")
            ]),
          ];
          this.isShowAll = false;
          this.displayedArticles = [this.navigationButtons[0]];

          this.#startEventListeners();
        } // constructor

        /* Event listeners */
        #startEventListeners() {
          this.allButtons.forEach((item) => {
            item.addEventListener("click", this.navItemOnClick.bind(this), true);
          });
          this.allExpandButtons.forEach((item) => {
            item.addEventListener("click", this.expandButtonOnClick.bind(this), true);
          });
          this.showAllButton.addEventListener("click", this.showAllButtonOnClick.bind(this));
        }

        navItemOnClick(event, list=null) {
          if (list == null) {
            list = this.navigationButtons;
          }

          for (let i = 0; i < list.length; i++) {
            if (list[i].buttonClass == event.target.parentElement.classList[0]) {
              this.toggleArticle(list[i]);
              break;
            }
            if (list[i].children.length > 0) {
              this.navItemOnClick(event, list[i].children);
            }
          }
        }

        expandButtonOnClick(event, list=null) {
          if (list == null) {
            list = this.navigationButtons;
            event.target.classList.toggle("active");
          }

          for (let i = 0; i < list.length; i++) {
            if (list[i].buttonClass == event.target.parentElement.classList[0]) {
              this.toggleExpand(list[i]);
              break;
            }
            if (list[i].children.length > 0) {
              this.expandButtonOnClick(event, list[i].children);
            }
          }
        }

        showAllButtonOnClick(event) {
          this.showAllButton.classList.toggle("active");
          this.isShowAll = !this.isShowAll;
          if (this.isShowAll) {
            this.showAllShowArticles(this.navigationButtons);
          } else {
            this.showAllHideArticles(this.navigationButtons);
            this.showAllShowArticles(this.displayedArticles);
          }
        }

        /* Methods */
        toggleExpand(parentButton) {
          parentButton.children.forEach((item) => {
            if (item.children > 0) {
              this.toggleExpand(item);
            }
            item.buttonDiv.classList.toggle("hidden");
          });
        }

        toggleArticle(navItem) {
          if (this.isShowAll) {
            return;
          }
          if (navItem.active) {
            navItem.correspondingArticle.classList.add("hidden");
            navItem.button.classList.remove("active");
            this.displayedArticles.forEach((element, index) => {
              if (element == navItem) {
                this.displayedArticles.splice(index, 1);
              }
            });
          } else {
            navItem.correspondingArticle.classList.remove("hidden");
            navItem.button.classList.add("active");
            this.displayedArticles.push(navItem);
          }
          navItem.active = !navItem.active;
        }

        showAllHideArticles(navItemList) {
          for (let i = 0; i < navItemList.length; i++) {
            navItemList[i].correspondingArticle.classList.add("hidden");
            navItemList[i].button.classList.remove("active");
            if (navItemList[i].children.length > 0) {
              this.showAllHideArticles(navItemList[i].children);
            }
          }
        }

        showAllShowArticles(navItemList) {
          for (let i = 0; i < navItemList.length; i++) {
            navItemList[i].correspondingArticle.classList.remove("hidden");
            navItemList[i].button.classList.add("active");
            if (navItemList[i].children.length > 0) {
              this.showAllShowArticles(navItemList[i].children);
            }
          };
        }
      } // Navigation
    } // SiteNavigation
    // Initialize
    const siteNavigation = new SiteNavigation.Navigation();
  </script>
  </body>
</html>
