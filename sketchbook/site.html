<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      display: flex;
      place-content: center;
      margin: 0;
      min-block-size: 100vh;
      font-family: sans-serif;
      background: linear-gradient(32deg, hsl(193 6 76), hsl(196 9 69) 50%);
    }

    .site-navigation {
      display: flex;
      inline-size: var(--expanded);
      margin-block: 5vmin;
      
      --bg--primary: hsl(203, 7%, 92%);
      --bg--active: hsla(203, 86%, 93%, 0.7);
      --bg--hover: hsl(200, 7%, 84%);
      --bg--focus: hsl(203, 100%, 100%);
      --gray--primary: hsl(200, 10%, 50%);
      --gray--secondary: hsl(200, 14%, 30%);

      --dark--primary: hsl(203, 13%, 14%);
      --dark--secondary: hsl(203, 4%, 29%);

      --accent--primary: hsl(206, 90%, 56%);
      --accent--secondary: hsl(206, 79%, 58%);

      --expanded: 16.875rem;
      --collapsed: 3.25rem;
      --svg: 1.125rem;
      --item: 2.25rem;
      --brad-outer: 0.75rem;
      --frame-space: 0.5rem;
      --brad-inner: calc(var(--brad-outer) - var(--frame-space));
    }

    .site-navigation label {
      cursor: pointer;
    }

    .site-navigation figure {
      margin-inline: 0;
      margin-block: 0.25rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      container-type: inline-size;
      gap: 0.375rem;
    }

    .site-navigation figcaption {
      text-align: center;
    }

    .site-navigation input[type="checkbox"] {
      display: none;
    }

    .site-navigation nav {
      background: var(--bg--primary);
      display: flex;
      flex-flow: column;
      min-width: var(--collapsed);
      border-radius: var(--brad-outer);
      flex: 0 0 auto;
      transition: flex-basis 300ms ease-out;
      will-change: flex-basis;
      padding: var(--frame-space);
      box-shadow: 0 3px 5px #1233, 0 5px 17px #0003;
    }

    .site-navigation header {
      display: flex;
      flex-flow: column;
      justify-content: center;
      gap: 0.5rem;
    }

    .site-navigation :checked~nav {
      flex-basis: var(--expanded);
    }

    .site-navigation :not(:checked)~nav {
      flex-basis: var(--collapsed);
    }

    .site-navigation .sidebar__toggle-container {
      block-size: var(--item);
      display: flex;
      justify-content: end;
    }

    .site-navigation .nav__toggle {
      block-size: 100%;
      background: none;
      transition: all 233ms ease-in;
      border-radius: var(--brad-inner);
      outline: 2px solid transparent;
      outline-offset: -2px;
      overflow: hidden;
    }

    .site-navigation .toggle--icons {
      block-size: inherit;
      aspect-ratio: 1;
      display: inline-grid;
      place-content: center;
      grid-template-areas: "svg";
      z-index: 10;
    }

    .site-navigation .toggle-svg-icon {
      grid-area: svg;
      fill: var(--gray--primary);
      transition: fill 233ms ease-in;
    }

    .site-navigation .nav__toggle:hover {
      outline: 2px solid var(--accent--primary);
    }

    .site-navigation .toggle--icons:hover .toggle-svg-icon {
      fill: var(--dark--primary);
    }

    .site-navigation .user-id {
      font-size: 1.0625rem;
      font-weight: 500;
      margin-block-end: 0.25rem;
      color: var(--gray--secondary);
      margin: 0;
      line-height: 1.1;
    }

    .site-navigation .user-role {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--gray--primary);
      margin: 0;
      line-height: 1.1;
    }

    .site-navigation .sidebar__wrapper {
      --list-gap: 0.5rem;
      display: flex;
      flex-flow: column;
      gap: var(--list-gap);
    }

    .site-navigation .sidebar__list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-flow: column;
      gap: 0.125rem;
      overflow: hidden;
    }

    .site-navigation .sidebar__item {
      block-size: var(--item);
      border-radius: var(--brad-inner);
    }

    .site-navigation .sidebar__link {
      display: flex;
      text-decoration: none;
      block-size: 100%;
      align-items: center;
      gap: 0.5rem;
      outline: 2px solid transparent;
      border-radius: inherit;
    }

    .site-navigation .icon {
      aspect-ratio: 1;
      block-size: 100%;
      display: inline-grid;

      svg {
        place-self: center;
        inline-size: var(--svg);
        block-size: var(--svg);
        fill: var(--gray--primary);
      }
    }

    .site-navigation .text {
      pointer-events: none;
      color: var(--gray--secondary);
      font-size: 0.875em;
      font-weight: 500;
      transition: color 266ms ease-out;
    }

    .site-navigation .sidebar__link:hover {
      background: var(--bg--hover);

      .icon svg {
        fill: var(--accent--primary);
      }

      .text {
        color: var(--dark--primary);
      }
    }

    .site-navigation .sidebar__link:focus {
      outline: 2px solid var(--accent--secondary);
      outline-offset: -2px;
      background: var(--bg--focus);

      .icon svg {
        fill: var(--accent--primary);
      }
    }

    .site-navigation .sidebar__link:active {
      background-color: var(--bg--active);
    }

    aside.site-navigation:not(:has(:checked)) .toggle--open,
    aside.site-navigation:has(:checked) .toggle--close {
      opacity: 0;
    }

    aside.site-navigation:not(:has(:checked)) :where(figcaption, .item--heading) {
      opacity: 0;
    }

    aside.site-navigation:has(:checked) :where(figcaption, .item--heading) {
      transition: opacity 300ms ease-in 200ms;
    }

    .site-navigation [data-tooltip]::before {
      content: attr(data-tooltip);
      position: fixed;
      translate: calc(var(--item) * 1.5) calc(var(--item) * 0.125);
      border-radius: var(--brad-inner);
      padding: 0.125rem 0.5rem;
      color: #ddd;
      background-color: hsl(198 16 30);
      box-shadow: 0 6px 12px -6px #0003;
      opacity: 0;
      pointer-events: none;
      scale: 0 0;
      z-index: 999;
      font-size: 0.75rem;
      font-weight: 500;
      transition: all 350ms ease-out;
    }

    aside.site-navigation:not(:has(:checked)) .sidebar__link:where(:hover, :focus-visible)[data-tooltip]::before {
      opacity: 1;
      scale: 1;
    }
  </style>
</head>

<body>

              </svg>
            </span>
          </label>

        <figure>

                  <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.5 8H4m0-2v13a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V9a1 1 0 0 0-1-1h-5.032a1 1 0 0 1-.768-.36l-1.9-2.28a1 1 0 0 0-.768-.36H5a1 1 0 0 0-1 1Z"/>

                  <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.5 8H4m0-2v13a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V9a1 1 0 0 0-1-1h-5.032a1 1 0 0 1-.768-.36l-1.9-2.28a1 1 0 0 0-.768-.36H5a1 1 0 0 0-1 1Z"/>

                  <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.5 8H4m0-2v13a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V9a1 1 0 0 0-1-1h-5.032a1 1 0 0 1-.768-.36l-1.9-2.28a1 1 0 0 0-.768-.36H5a1 1 0 0 0-1 1Z"/>

      </section>

  </aside>
</body>
