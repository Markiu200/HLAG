<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newfluence - Copypastas</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <!-- The copypasta snackbar -->
  <div id="snackbar">Copied</div>

  <!-- E-form copypasta section -->
  <section class="section">
    <div style="display: flex;">
      <button class="buttonDiv" onclick="eformHandledCopypasta()">E-form handled</button>
      <button class="buttonDiv" onclick="eformWithNumberHandledCopypasta()">E-form handled with number</button>
      <button class="buttonDiv" onclick="eformWillBeHandledCopypasta()">E-form will be handled</button>
      <button class="buttonDiv" onclick="sitaEformHandledCopypasta()">SITA E-form handled</button>
      <button class="buttonDiv" onclick="eformByChangemanagementCopypasta()">E-form with change&shy;management</button>
      <button class="buttonDiv" onclick="copypasta1()">Signature</button>
      <button class="buttonDiv" onclick="copypasta2()">Please allow Azure to sync</button>
      <button class="buttonDiv" onclick="copypasta3()">SITA please proceed</button>
      <button class="buttonDiv" onclick="copypasta4()">Both Exchange privileges</button>
    </div>
    <div>
      <input type="text" id="eformCopypastaInput" placeholder="HLSUPPORT">
    </div>
  </section>


  <!-- -------------------- -->
  <!-- Mailboxes copypastas -->
  <!-- -------------------- -->

  <section class="section copypastas">
    <h4 style="position: absolute; top: -20px; left: 1px;">Mailboxes copypasta</h4>
    
    <!-- Input panel-->
    <div class="copypastas__mailboxes__input-panel">
      <!-- Toggle buttons grid - 4 columns -->
      <div class="copypastas__mailboxes__input-panel__button-grid">

        <div class="copypastas__mailboxes__input-panel__button-grid__row-title grant"><p>GRANT</p></div>
        <button class="copypastas__mailboxes__input-panel__button-grid__button js-grant-full">Full Access</button>
        <button class="copypastas__mailboxes__input-panel__button-grid__button js-grant-as">Send As</button>
        <button class="copypastas__mailboxes__input-panel__button-grid__button js-grant-behalf">Send on Behalf</button>  

        <div class="copypastas__mailboxes__input-panel__button-grid__row-title revoke"><p>REVOKE</p></div>
        <button class="copypastas__mailboxes__input-panel__button-grid__button js-revoke-full">Full Access</button>
        <button class="copypastas__mailboxes__input-panel__button-grid__button js-revoke-as">Send As</button>
        <button class="copypastas__mailboxes__input-panel__button-grid__button js-revoke-behalf">Send on Behalf</button>

        <input class="copypastas__mailboxes__input-panel__button-grid__alias-window js-alias-input-window" 
          type="text" placeholder="alias">
        <!-- span from right -->
        <button class="copypastas__mailboxes__input-panel__button-grid__button js-onprem active">Cloud</button>
        <button class="copypastas__mailboxes__input-panel__button-grid__button js-cloud">On-prem</button>

      </div>

      <!-- Text inputs -->
      <div>
        <textarea 
          class="copypastas__mailboxes__input-panel__text__textarea js-users-input-window" placeholder="users" ></textarea>
        <button">Craft & copy</button>
        <button class="js-clear-commands-button">Clear</button>
        <p style="font-size: small;" class="js-users-output-window"></p>
      </div>
    </div>
    <div style="clear: both; height: 20px;"></div>
    
    
    <div>
      <textarea class="js-commands-output-window"
        rows="12" placeholder="commands will appear here..." style="width: 90%; resize: vertical;"></textarea>
    </div>

  </section>











  <script>
    // NAMESPACE copypastas
    const copypastas = {
      start() {
        this.mailboxes.start();
      },     

      mailboxes: {
        /** 
         * It gonna be internal class, start with "new" (?)
        */
        aliasInputWindow: document.querySelector(".js-alias-input-window"),
        usersInputWindow: document.querySelector(".js-users-input-window"),
        usersOutputWindow: document.querySelector(".js-users-output-window"),
        commandsOutputWindow: document.querySelector(".js-commands-output-window"),
        clearCommandsButton: document.querySelector(".js-clear-commands-button"),
        /* toggle buttons*/
        buttonMap: new Map([
          ["js-grant-full", {element: document.querySelector(".js-grant-full"), active: false}],
          ["js-grant-as", {element: document.querySelector(".js-grant-as"), active: false}],
          ["js-grant-behalf", {element: document.querySelector(".js-grant-behalf"), active: false}],
          ["js-revoke-full", {element: document.querySelector(".js-revoke-full"), active: false}],
          ["js-revoke-as", {element: document.querySelector(".js-revoke-as"), active: false}],
          ["js-revoke-behalf", {element: document.querySelector(".js-revoke-behalf"), active: false}],
        ]),
        onpremCloudMap: new Map([
          ["js-onprem", {element: document.querySelector(".js-onprem"), active: true}],
          ["js-cloud", {element: document.querySelector(".js-cloud"), active: false}],
        ]),
        /* non-DOM properties */
        usersArray: [],
        readableUsersListString: "",
        /* state */
        state: {
          jsGrantFull: false,
          jsGrantAs: false,
          jsGrantBehalf: false,
          jsRevokeFull: false,
          jsRevokeAs: false,
          jsRevokeBehalf: false,
          jsOnprem: false,
          jsCloud: true,
          jsAliasInputWindow: null,
          jsUsersInputWindow: null
        },


        /* Initializer */
        start() {
          const onPrivilegeButtonClickBind = this.onPrivilegeButtonClick.bind(this);
          const onOnpremCloudButtonClickBind = this.onOnpremCloudButtonClick.bind(this);
          /* add event listeners */
          this.eventListeners = new Map([
            ["js-grant-full", this.buttonMap.get("js-grant-full").element.addEventListener("click", this.onPrivilegeButtonClick.bind(this))],
            ["js-grant-as", this.buttonMap.get("js-grant-as").element.addEventListener("click", this.onPrivilegeButtonClick.bind(this))],
            ["js-grant-behalf", this.buttonMap.get("js-grant-behalf").element.addEventListener("click", this.onPrivilegeButtonClick.bind(this))],
            ["js-revoke-full", this.buttonMap.get("js-revoke-full").element.addEventListener("click", this.onPrivilegeButtonClick.bind(this))],
            ["js-revoke-as", this.buttonMap.get("js-revoke-as").element.addEventListener("click", this.onPrivilegeButtonClick.bind(this))],
            ["js-revoke-behalf", this.buttonMap.get("js-revoke-behalf").element.addEventListener("click", this.onPrivilegeButtonClick.bind(this))],
            ["js-onprem", this.onpremCloudMap.get("js-onprem").element.addEventListener("click", this.onOnpremCloudButtonClick.bind(this))],
            ["js-cloud", this.onpremCloudMap.get("js-cloud").element.addEventListener("click", this.onOnpremCloudButtonClick.bind(this))],
            ["js-alias-input-window", this.aliasInputWindow.addEventListener("change", this.onAliasInputWindowChange.bind(this))],
            ["js-users-input-window", this.usersInputWindow.addEventListener("change", this.onUsersInputWindowChange.bind(this))],
            ["js-clear-commands-button", this.clearCommandsButton.addEventListener("click", this.onClearButtonClick.bind(this))]
          ]);
        },

        /* Event listeners */
        onPrivilegeButtonClick(event) {
          for (const [key, value] of this.buttonMap) {
            if (event.target.classList.contains(key)) {
              this.privilegeToggle(value);
            }
          }
        },

        onOnpremCloudButtonClick(event) {
          let buttonObject;
          if (event.target.classList.contains("js-onprem")) {
            buttonObject = this.onpremCloudMap.get("js-onprem");
          } else {
            buttonObject = this.onpremCloudMap.get("js-cloud");
          }
          this.onpremCloudToggle(buttonObject);
        },

        onUsersInputWindowChange() {
          this.getUsersArray();
          this.getUsersAsReadableList();
          this.writeFilteredUsers();
          this.getCopypasta_commands(); // rebuild commands
        },

        onAliasInputWindowChange() {
          this.getCopypasta_commands(); // rebuild commands
        },

        onClearButtonClick() {
          this.clear();
        },

        /* Methods - User list related */

        getUsersArray() {
          users = this.usersInputWindow.value.trim();
          users = users.replaceAll(",", "");
          users = users.replaceAll("\t", " ");
          users = users.replaceAll("\r", "");
          users = users.replaceAll("\n", " ");
          this.usersArray = users.split(" ");
          if (this.usersArray.length == 1 && this.usersArray[0] == "") {
            this.usersArray.splice(0, this.usersArray.length);
          }
        },
        getUsersAsReadableList() {
          this.readableUsersListString = "";
          this.usersArray.forEach(element => {
            this.readableUsersListString += "\"" + element + "\" ";
          });
          this.readableUsersListString.trim();
        },
        writeFilteredUsers() {
          this.usersOutputWindow.innerHTML = this.readableUsersListString;
        },

        /* Methods - Privilege buttons related */

        /** 
         * Toggles particular privileges buttons and rebuilds the command list.
         * Returns nothing.
        */
        privilegeToggle(button) {
          if (button.active) {
            button.element.classList.remove("active");
            button.active = false;
          } else {
            button.element.classList.add("active");
            button.active = true;
          }
          this.getCopypasta_commands(); // rebuild commands
        },

        /** 
         * Toggles On-prem / Cloud buttons and rebuilds the command list.
         * Returns nothing.
        */
        onpremCloudToggle(button) {
          this.onpremCloudMap.forEach((obj) => {
            obj.element.classList.remove("active");
            obj.active = false;
          });
          button.element.classList.add("active");
          button.active = true;
          this.getCopypasta_commands(); // rebuild commands
        },

        /* Commands related */

        /** 
         * Checks if alias is set, at least one user is set, and at least one privilege is set.
         * Returns true if all is ok.
        */
        testForFields() {
          let alias = this.aliasInputWindow.value.trim();
          if (!alias || alias.length == 0) {
            console.log("alias empty");
            return false;
          }
          if (!this.usersArray || this.usersArray.length == 0) {
            console.log("usersArray empty");
            return false;
          }
          allSet = false;
          this.buttonMap.forEach((value, key) => {
            if (value.active == true) {allSet = true; return;}
          });
          console.log("no buttons selected");
          return allSet; // and also other things work out too
        },

        /**
         * Writes generated commands to the output window.
         * Returns nothing.
        */
        getCopypasta_commands() {
          // test if everything is set
          if (this.testForFields() == false) {
            console.log("test clear");
            this.commandsOutputWindow.value = "";
            return;
          }
          // set cloud / on-prem flag
          isCloud = true;
          if (this.onpremCloudMap.get("js-cloud").active == true) {
            isCloud = true;
          } else {
            isCloud = false;
          }
          // getting commands
          let alias = this.aliasInputWindow.value.trim();
          revokeCommands = "";
          grantCommands = "";
          this.usersArray.forEach((user) => {
            this.buttonMap.forEach((value, key) => {
              if (value.active) {
                grantCommands += this.getCopypasta_getSingleCommand(key, alias, user, isCloud);
              }
            })
          });
          console.log("commands got");
          this.commandsOutputWindow.value = grantCommands;
        },

        /** 
         * Generates one command line for given parameters.
         * Returns string.
        */
        getCopypasta_getSingleCommand(privilege, alias, user, onCloud) {
          if (privilege == "js-grant-full") {
            return `Add-MailboxPermission -Identity '${alias}' -User '${user}' -AccessRights 'FullAccess' -AutoMapping:$false -Confirm:$false\r\n`;
          }
          if (privilege == "js-revoke-full") {
            return `Remove-MailboxPermission -Identity '${alias}' -User '${user}' -AccessRights 'FullAccess' -Confirm:$false\r\n`;
          }
          if (privilege == "js-grant-as") {
            if (onCloud) {
              return `Add-RecipientPermission '${alias}' -Trustee '${user}' -AccessRights 'SendAs' -confirm:$false\r\n`;
            } else {
              return `Get-Mailbox '${alias}' | Add-ADPermission -User '${user}' -ExtendedRights 'Send As' -Confirm:$false\r\n`;
            }
          }
          if (privilege == "js-revoke-as") {
            if (onCloud) {
              return `Remove-RecipientPermission '${alias}' -Trustee '${user}' -AccessRights 'SendAs' -confirm:$false\r\n`;
            } else {
              return `Get-Mailbox '${alias}' | Remove-ADPermission -User '${user}' -ExtendedRights 'Send As' -confirm:$false\r\n`;
            }
          }
          if (privilege == "js-grant-behalf") {
            return `Set-Mailbox '${alias}' -Grantsendonbehalfto @{add='${user}'} -confirm:$false\r\n`;
          }
          if (privilege == "js-revoke-behalf") {
            return `Set-Mailbox '${alias}' -Grantsendonbehalfto @{remove='${user}'} -confirm:$false\r\n`;
          }
        },

        getCopyPasta() {
          let generatedText;
          let alias = this.aliasInputWindow.value.trim();
          
          if (this.usersArray.length > 1) {
            generatedText = "Users ";
            this.usersArray.forEach(element => {  
              generatedText += element + ", ";
            })
            generatedText = generatedText.slice(0, generatedText.length - 2);
            generatedText += " were added to the " + alias + " mailbox.";
          } else {
            generatedText = "User " + this.usersArray[0] + " was added to the " + alias + " mailbox.";
          }
          console.log(generatedText);
          
          navigator.clipboard.writeText(generatedText);
          showSnackbar();
        },

        /** 
         * Clears selected privileges, users and alias windows.
         * Returns nothing.
        */
        clear() {
          console.log("clear run!");
          this.usersInputWindow.value = "";
          this.usersOutputWindow.innerHTML = "";
          this.aliasInputWindow.value = "";
          this.commandsOutputWindow.value = "";
          this.usersArray.splice(0, this.usersArray.length);
          this.readableUsersListString = "";
          this.buttonMap.forEach((value, key) => {
            value.active = false;
            value.element.classList.remove("active");
          })
        },

        /* localStorage */
        saveState() {
          this.state.jsGrantFull = this.buttonMap.get("js-grant-full").active;
          this.state.jsGrantAs = this.buttonMap.get("js-grant-as").active;
          this.state.jsGrantBehalf = this.buttonMap.get("js-grant-behalf").active;
          this.state.jsRevokeFull = this.buttonMap.get("js-revoke-full").active;
          this.state.jsRevokeAs = this.buttonMap.get("js-revoke-as").active;
          this.state.jsRevokeBehalf = this.buttonMap.get("js-revoke-behalf").active;
          this.state.jsOnprem = this.onpremCloudMap.get("js-onprem").active;
          this.state.jsCloud = this.onpremCloudMap.get("js-cloud").active;
          this.state.jsAliasInputWindow = this.aliasInputWindow.value;
          this.state.jsUsersInputWindow = this.usersInputWindow.value;
          localStorage.setItem("copypastasMailboxes", JSON.stringify(this.state));
          console.log(JSON.stringify(this.state));
        },

        loadState() {
          const loadedObject = JSON.parse(localStorage.getItem("copypastasMailboxes"));
          this.buttonMap.set("js-grant-full", loadedObject.jsGrantFull);
          this.buttonMap.set("js-grant-as", loadedObject.jsGrantAs);
          this.buttonMap.set("js-grant-behalf", loadedObject.jsGrantBehalf);
        },

        returnStateAsObject() {

        }

      } // mailboxes
    } // copypastas
    
    // Internal classes - ButtonObject
    copypastas.ButtonObject = function(domObject = null, isActive = false) {
      this.element = domObject;
      this.active = isActive;
    }
    copypastas.ButtonObject.prototype.activate = function() {
      this.active = true;
      if (this.element != null) {
        this.element.classList.add("active");
      }
    }
    copypastas.ButtonObject.prototype.deactivate = function() {
      this.active = false;
      if (this.element != null) {
        this.element.classList.remove("active");
      }
    }

    // initialize
    copypastas.start();

    //
    //  FUNCTIONS
    //
    function showSnackbar(text = "Copied") {
      var x = document.getElementById("snackbar");
      x.innerHTML = text;
      x.className = "show";
      // After 3 seconds, remove the show class from DIV
      setTimeout(function(){ x.className = x.className.replace("show", ""); }, 400);
    } 
    
    function eformHandledCopypasta() {
      navigator.clipboard.writeText(
        "-------------------------\r\nRequest has been handled.\r\n\r\nKind regards\r\nMarcin Kazmierczak\r\nITSD Hapag Lloyd\r\n-------------------------"
      );
      showSnackbar();
    }

    function sitaEformHandledCopypasta() {
      let x = document.getElementById("eformCopypastaInput").value;
      let reg = /HLSUPPORT-\d*/i;
      var matches = x.match(reg);
      navigator.clipboard.writeText(
        "-------------------------\r\nRequest has been forwarded to SITA in "+matches[0].toUpperCase()+".\r\n\r\nKind regards\r\nMarcin Kazmierczak\r\nITSD Hapag Lloyd\r\n-------------------------"
      );
      showSnackbar();
    }

    function eformWithNumberHandledCopypasta() {
      let x = document.getElementById("eformCopypastaInput").value;
      let reg = /HLSUPPORT-\d*/i;
      var matches = x.match(reg);
      navigator.clipboard.writeText(
        "-------------------------\r\nRequest has been handled in "+matches[0].toUpperCase()+".\r\n\r\nKind regards\r\nMarcin Kazmierczak\r\nITSD Hapag Lloyd\r\n-------------------------"
      );
      showSnackbar();
    }

    function eformWillBeHandledCopypasta() {
      let x = document.getElementById("eformCopypastaInput").value;
      let reg = /HLSUPPORT-\d*/i;
      var matches = x.match(reg);
      navigator.clipboard.writeText(
        "-------------------------\r\nRequest will be handled in "+matches[0].toUpperCase()+".\r\n\r\nKind regards\r\nMarcin Kazmierczak\r\nITSD Hapag Lloyd\r\n-------------------------"
      );
      showSnackbar();
    }

    function eformByChangemanagementCopypasta() {
      navigator.clipboard.writeText(
        "-------------------------\r\nRequest has been forwarded to changemanagement team. Progress will be tracked via email / created Jira ticket\r\n\r\nKind regards\r\nMarcin Kazmierczak\r\nITSD Hapag Lloyd\r\n-------------------------"
      );
      showSnackbar();
    }

    function copypasta1() {
      navigator.clipboard.writeText(
        "Kind regards\r\nMarcin Kazmierczak\r\nITSD Hapag Lloyd"
      );
      showSnackbar();
    }

    function copypasta2() {
      navigator.clipboard.writeText(
        "Please allow Azure ~90 minutes to sync."
      );
      showSnackbar();
    }

    function copypasta3() {
      navigator.clipboard.writeText(
        "Dear SITA,\r\n\r\nPlease proceed with the request.\r\n\r\nKind regards\r\nMarcin Kazmierczak\r\nITSD Hapag Lloyd"
      );
      showSnackbar();
    }

    function copypasta4() {
      navigator.clipboard.writeText(
        "Please note that when both Send As and Send on Behalf privileges are granted, only Send As may work."
      );
      showSnackbar();
    }

    // mailboxesCopypasta.textareaOnchange()
    // window.onload = (event) => {mailboxesCopypasta.textareaOnchange()};
  </script>
</body>
</html>
