<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newfluence - Copypastas</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <!-- The copypasta snackbar -->
  <div id="snackbar">Copied</div>

  <!-- E-form copypasta section -->
  <section class="section">
    <div style="display: flex;">
      <button class="buttonDiv" onclick="eformHandledCopypasta()">E-form handled</button>
      <button class="buttonDiv" onclick="eformWithNumberHandledCopypasta()">E-form handled with number</button>
      <button class="buttonDiv" onclick="eformWillBeHandledCopypasta()">E-form will be handled</button>
      <button class="buttonDiv" onclick="sitaEformHandledCopypasta()">SITA E-form handled</button>
      <button class="buttonDiv" onclick="eformByChangemanagementCopypasta()">E-form with change&shy;management</button>
      <button class="buttonDiv" onclick="copypasta1()">Signature</button>
      <button class="buttonDiv" onclick="copypasta2()">Please allow Azure to sync</button>
      <button class="buttonDiv" onclick="copypasta3()">SITA please proceed</button>
      <button class="buttonDiv" onclick="copypasta4()">Both Exchange privileges</button>
    </div>
    <div>
      <input type="text" id="eformCopypastaInput" placeholder="HLSUPPORT">
    </div>
  </section>


  <!-- -------------------- -->
  <!-- Mailboxes copypastas -->
  <!-- -------------------- -->

  <section class="section">
    <h4 style="position: absolute; top: -20px; left: 1px;">Mailboxes copypasta</h4>
    
    <!-- Toggle buttons -->
    <div style="float: left;">
      <div class="mailbox_copypastas_privileges">
        <div class="grant">GRANT</div>
        <button id="mailbox_copypastas_grantFullAccessButton" onclick="mailboxesCopypasta.privilegeToggle(event);">Full Access</button>
        <button id="mailbox_copypastas_grantSendAsButton" onclick="mailboxesCopypasta.privilegeToggle(event);">Send As</button>
        <button id="mailbox_copypastas_grantSendOnBehalfButton" onclick="mailboxesCopypasta.privilegeToggle(event);">Send on Behalf</button>
      </div>
      <div style="margin: 0; padding: 0;"></div>
      <div class="mailbox_copypastas_privileges">
        <div class="revoke">REVOKE</div>
        <button id="mailbox_copypastas_revokeFullAccessButton" onclick="mailboxesCopypasta.privilegeToggle(event);">Full Access</button>
        <button id="mailbox_copypastas_revokeSendAsButton" onclick="mailboxesCopypasta.privilegeToggle(event);">Send As</button>
        <button id="mailbox_copypastas_revokeSendOnBehalfButton" onclick="mailboxesCopypasta.privilegeToggle(event);">Send on Behalf</button>
      </div>
      <div style="margin: 0; padding: 0;"></div>
      <div class="mailbox_copypastas_privileges right">
        <button id="mailbox_copypastas_cloudButton" class=" active" onclick="mailboxesCopypasta.cloudOnpremToggle(event);">Cloud</button>
        <button id="mailbox_copypastas_onpremButton" onclick="mailboxesCopypasta.cloudOnpremToggle(event);">On-prem</button>
      </div>
    </div>
    <div style="clear: both; height: 20px;"></div>
    
    <input type="text" placeholder="alias" id="mailboxesCopypasta_alias" onchange="mailboxesCopypasta.aliasOnchange()">
    <textarea 
      style="resize: none;" rows="8" cols="20" placeholder="users" id="mailboxesCopypasta_users" 
      onchange="mailboxesCopypasta.textareaOnchange()"></textarea>
    <button onclick="mailboxesCopypasta.getCopyPasta()">Craft & copy</button>
    <button onclick="mailboxesCopypasta.clear()">Clear</button>
    <p style="font-size: small;" id="mailboxesCopypasta_usersGotList"></p>

    <div>
      <textarea id="mailboxesCopypasta_commandResultViewWindow"
        rows="12" placeholder="commands will appear here..." style="width: 90%; resize: vertical;"></textarea>
    </div>

  </section>











  <script>
    //
    //  OBJECTS SECTION
    //
    /* mailboxesCopypasta */
    let mailboxesCopypasta = {
      textarea: document.getElementById("mailboxesCopypasta_users"),
      foundUsers: document.getElementById("mailboxesCopypasta_usersGotList"),
      aliasInput: document.getElementById("mailboxesCopypasta_alias"),
      viewWindow: document.getElementById("mailboxesCopypasta_commandResultViewWindow"),
      /* toggle buttons*/
      buttonMap: new Map([
        ["mailbox_copypastas_grantFullAccessButton", {element: document.getElementById("mailbox_copypastas_grantFullAccessButton"), active: false}],
        ["mailbox_copypastas_grantSendAsButton", {element: document.getElementById("mailbox_copypastas_grantSendAsButton"), active: false}],
        ["mailbox_copypastas_grantSendOnBehalfButton", {element: document.getElementById("mailbox_copypastas_grantSendOnBehalfButton"), active: false}],
        ["mailbox_copypastas_revokeFullAccessButton", {element: document.getElementById("mailbox_copypastas_revokeFullAccessButton"), active: false}],
        ["mailbox_copypastas_revokeSendAsButton", {element: document.getElementById("mailbox_copypastas_revokeSendAsButton"), active: false}],
        ["mailbox_copypastas_revokeSendOnBehalfButton", {element: document.getElementById("mailbox_copypastas_revokeSendOnBehalfButton"), active: false}],
      ]),
      cloudOnpremMap: new Map([
        ["mailbox_copypastas_cloudButton", {element: document.getElementById("mailbox_copypastas_cloudButton"), active: true}],
        ["mailbox_copypastas_onpremButton", {element: document.getElementById("mailbox_copypastas_onpremButton"), active: false}],
      ]),
      /* non-DOM properties*/
      filteredUsersArray: [],
      readableList: "",
      commandList: "",

      /* User list related */
      getUsersArray() {
        users = this.textarea.value.trim();
        users = users.replaceAll(",", "");
        users = users.replaceAll("\t", " ");
        users = users.replaceAll("\r", "");
        users = users.replaceAll("\n", " ");
        let usersArray = users.split(" ");
        this.filteredUsersArray.splice(0, this.filteredUsersArray.length);
        usersArray.forEach(element => {
          if (element && element.length > 0) {
            this.filteredUsersArray.push(element);
          }
        });
      },
      getUsersAsReadableList() {
        this.readableList = "";
        this.filteredUsersArray.forEach(element => {
          this.readableList += "\"" + element + "\" ";
        });
        this.readableList.trim();
      },
      writeFilteredUsers() {
        this.foundUsers.innerHTML = this.readableList;
      },
      textareaOnchange() {
        this.getUsersArray();
        this.getUsersAsReadableList();
        this.writeFilteredUsers();
        this.getCopypasta_commands(); // rebuild commands
      },
      aliasOnchange() {
        this.getCopypasta_commands(); // rebuild commands
      },

      /* Privilege buttons related */
      privilegeToggle(button) {
        mapItem = this.buttonMap.get(button.target.id);
        dom = mapItem.element;   
        if (mapItem.active) {
          dom.className = dom.className.replace(" active", "");
          mapItem.active = false;
        } else {
          dom.className += " active";
          mapItem.active = true;
        }
        this.getCopypasta_commands(); // rebuild commands
      },
      cloudOnpremToggle(button) {
        mapItem = this.cloudOnpremMap.get(button.target.id);
        dom = mapItem.element;        
        if (dom && button.target.id == "mailbox_copypastas_cloudButton") {
          if (mapItem.active) {
            return;
          } else {
            dom.className += " active";
            mapItem.active = true;
            otherOne = this.cloudOnpremMap.get("mailbox_copypastas_onpremButton");
            otherOne.element.className = otherOne.element.className.replace(" active", "");
            otherOne.active = false;           
            this.getCopypasta_commands(); // rebuild commands
            return;
          }
        }
        if (dom && button.target.id == "mailbox_copypastas_onpremButton") {
          if (mapItem.active) {
            return;
          } else {
            dom.className += " active";
            mapItem.active = true;
            otherOne = this.cloudOnpremMap.get("mailbox_copypastas_cloudButton");
            otherOne.element.className = otherOne.element.className.replace(" active", "");
            otherOne.active = false;           
            this.getCopypasta_commands(); // rebuild commands
            return;
          }
        }
      },

      /* Commands related */
      testForFields() {
        let alias = this.aliasInput.value.trim();
        if (!alias || alias.length == 0) {
          return false;
        }
        if (!this.filteredUsersArray || this.filteredUsersArray.length == 0) {
          return false;
        }
        somethingSet = false;
        this.buttonMap.forEach((value, key) => {
          if (value.active == true) {somethingSet = true; return;}
        });
        if (somethingSet) {
          return true;
        }
        return false;
      },
      getCopypasta_commands() {
        // test if everything is set
        if (this.testForFields() == false) {
          this.viewWindow.value = "";
        }
        // set cloud / on-prem flag
        isCloud = true;
        if (this.cloudOnpremMap.get("mailbox_copypastas_cloudButton").active == true) {
          isCloud = true;
        } else {
          isCloud = false;
        }
        // getting commands
        alias = this.aliasInput.value.trim();
        revokeCommands = "";
        grantCommands = "";
        this.filteredUsersArray.forEach((user) => {
          this.buttonMap.forEach((value, key) => {
            if (value.active) {
              grantCommands += this.getCopypasta_getSingleCommand(key, alias, user, isCloud);
            }
          })
        });
        this.viewWindow.value = grantCommands;
      },
      getCopypasta_getSingleCommand(privilege, alias, user, onCloud) {
        if (privilege == "mailbox_copypastas_grantFullAccessButton") {
          return `Add-MailboxPermission -Identity '${alias}' -User '${user}' -AccessRights 'FullAccess' -AutoMapping:$false -Confirm:$false\r\n`;
        }
        if (privilege == "mailbox_copypastas_revokeFullAccessButton") {
          return `Remove-MailboxPermission -Identity '${alias}' -User '${user}' -AccessRights 'FullAccess' -Confirm:$false\r\n`;
        }
        if (privilege == "mailbox_copypastas_grantSendAsButton") {
          if (onCloud) {
            return `Add-RecipientPermission '${alias}' -Trustee '${user}' -AccessRights 'SendAs' -confirm:$false\r\n`;
          } else {
            return `Get-Mailbox '${alias}' | Add-ADPermission -User '${user}' -ExtendedRights 'Send As' -Confirm:$false\r\n`;
          }
        }
        if (privilege == "mailbox_copypastas_revokeSendAsButton") {
          if (onCloud) {
            return `Remove-RecipientPermission '${alias}' -Trustee '${user}' -AccessRights 'SendAs' -confirm:$false\r\n`;
          } else {
            return `Get-Mailbox '${alias}' | Remove-ADPermission -User '${user}' -ExtendedRights 'Send As' -confirm:$false\r\n`;
          }
        }
        if (privilege == "mailbox_copypastas_grantSendOnBehalfButton") {
          return `Set-Mailbox '${alias}' -Grantsendonbehalfto @{add='${user}'} -confirm:$false\r\n`;
        }
        if (privilege == "mailbox_copypastas_revokeSendOnBehalfButton") {
          return `Set-Mailbox '${alias}' -Grantsendonbehalfto @{remove='${user}'} -confirm:$false\r\n`;
        }
      },

      getCopyPasta() {
        let generatedText;
        let alias = this.aliasInput.value.trim();
        
        if (this.filteredUsersArray.length > 1) {
          generatedText = "Users ";
          this.filteredUsersArray.forEach(element => {  
            generatedText += element + ", ";
          })
          generatedText = generatedText.slice(0, generatedText.length - 2);
          generatedText += " were added to the " + alias + " mailbox.";
        } else {
          generatedText = "User " + this.filteredUsersArray[0] + " was added to the " + alias + " mailbox.";
        }
        console.log(generatedText);
        
        navigator.clipboard.writeText(generatedText);
        showSnackbar();
      },

      clear() {
        this.textarea.value = "";
        this.foundUsers.innerHTML = "";
        this.aliasInput.value = "";
        this.viewWindow.value = "";
        this.filteredUsersArray.splice(0, this.filteredUsersArray.length);
        this.readableList = "";
        this.commandList = "";
        this.buttonMap.forEach((value, key) => {
          value.active = false;
          value.element.className = value.element.className.replace(" active", "");
        })
      }
    }
    
    //
    //  FUNCTIONS
    //
    function showSnackbar(text = "Copied") {
      var x = document.getElementById("snackbar");
      x.innerHTML = text;
      x.className = "show";
      // After 3 seconds, remove the show class from DIV
      setTimeout(function(){ x.className = x.className.replace("show", ""); }, 400);
    } 
    
    function eformHandledCopypasta() {
      navigator.clipboard.writeText(
        "-------------------------\r\nRequest has been handled.\r\n\r\nKind regards\r\nMarcin Kazmierczak\r\nITSD Hapag Lloyd\r\n-------------------------"
      );
      showSnackbar();
    }

    function sitaEformHandledCopypasta() {
      let x = document.getElementById("eformCopypastaInput").value;
      let reg = /HLSUPPORT-\d*/i;
      var matches = x.match(reg);
      navigator.clipboard.writeText(
        "-------------------------\r\nRequest has been forwarded to SITA in "+matches[0].toUpperCase()+".\r\n\r\nKind regards\r\nMarcin Kazmierczak\r\nITSD Hapag Lloyd\r\n-------------------------"
      );
      showSnackbar();
    }

    function eformWithNumberHandledCopypasta() {
      let x = document.getElementById("eformCopypastaInput").value;
      let reg = /HLSUPPORT-\d*/i;
      var matches = x.match(reg);
      navigator.clipboard.writeText(
        "-------------------------\r\nRequest has been handled in "+matches[0].toUpperCase()+".\r\n\r\nKind regards\r\nMarcin Kazmierczak\r\nITSD Hapag Lloyd\r\n-------------------------"
      );
      showSnackbar();
    }

    function eformWillBeHandledCopypasta() {
      let x = document.getElementById("eformCopypastaInput").value;
      let reg = /HLSUPPORT-\d*/i;
      var matches = x.match(reg);
      navigator.clipboard.writeText(
        "-------------------------\r\nRequest will be handled in "+matches[0].toUpperCase()+".\r\n\r\nKind regards\r\nMarcin Kazmierczak\r\nITSD Hapag Lloyd\r\n-------------------------"
      );
      showSnackbar();
    }

    function eformByChangemanagementCopypasta() {
      navigator.clipboard.writeText(
        "-------------------------\r\nRequest has been forwarded to changemanagement team. Progress will be tracked via email / created Jira ticket\r\n\r\nKind regards\r\nMarcin Kazmierczak\r\nITSD Hapag Lloyd\r\n-------------------------"
      );
      showSnackbar();
    }

    function copypasta1() {
      navigator.clipboard.writeText(
        "Kind regards\r\nMarcin Kazmierczak\r\nITSD Hapag Lloyd"
      );
      showSnackbar();
    }

    function copypasta2() {
      navigator.clipboard.writeText(
        "Please allow Azure ~90 minutes to sync."
      );
      showSnackbar();
    }

    function copypasta3() {
      navigator.clipboard.writeText(
        "Dear SITA,\r\n\r\nPlease proceed with the request.\r\n\r\nKind regards\r\nMarcin Kazmierczak\r\nITSD Hapag Lloyd"
      );
      showSnackbar();
    }

    function copypasta4() {
      navigator.clipboard.writeText(
        "Please note that when both Send As and Send on Behalf privileges are granted, only Send As may work."
      );
      showSnackbar();
    }

    mailboxesCopypasta.textareaOnchange()
    // window.onload = (event) => {mailboxesCopypasta.textareaOnchange()};
  </script>
</body>
</html>
