<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newfluence - Copypastas</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <!-- The copypasta snackbar -->
  <div id="snackbar">Copied</div>

  <!-- General URL input -->
  <section class="section">
    <input type="text" id="generalUrl" placeholder="Ticket URL..." size="80" oninput="ticketCopypasta.parseLink()" tabindex="1">
    <div class="inputWithCopyWrapper">
      <input type="text" readonly id="generalUrl_ticketNumber">
      <button onclick="ticketCopypasta.saveTicketNumber()" tabindex="-1">&#x2398;</button>
    </div>
    <div style="margin-top: 8px;">
      <input type="text" id="ticketSummary" placeholder="Ticket summary..." size="80" tabindex="2">
    </div>
    <div style="margin-top: 8px;">
      <textarea rows="2" cols="83" style="resize: none;" id="excelComment" tabindex="3"></textarea>
    </div>

    <!-- Copy to my / their excel -->
    <div style="display: flex;">
      <button class="buttonDiv" onclick="ticketCopypasta.copyToMyExcel()">Copy to my Excel</button>
      <button class="buttonDiv" onclick="ticketCopypasta.copyToTheirExcel()">Copy to their Excel</button>
      <button class="buttonDiv" onclick="ticketCopypasta.clear()">Clear</button>
      <button class="buttonDiv" onclick="ticketCopypasta.clearAll()">Clear All</button>
    </div>

    <select name="status" id="ticketStatusDropdown" tabindex="4">
      <option value="resolved">resolved</option>
      <option value="waiting">waiting</option>
      <option value="transferred">transferred</option>
      <option value="inprog">inprog</option>
      <option value="queued">queued</option>
      <option value="assist">assist</option>
      <option value="hold">hold</option>
      <option value="vendor">vendor</option>
    </select>

    <select name="source" id="ticketSourceDropdown" tabindex="5">
      <option value="MemoReg queue">MemoReg queue</option>
      <option value="Email">Email</option>
      <option value="Backdesk queue">Backdesk queue</option>
      <option value="Hardware queue">Hardware queue</option>
      <option value="transferred to Backdesk">transferred to Backdesk</option>
    </select>
  </section>

  <!-- E-form copypasta section -->
  <section class="section">
    <div style="display: flex;">
      <button class="buttonDiv" onclick="eformHandledCopypasta()">E-form handled</button>
      <button class="buttonDiv" onclick="eformWithNumberHandledCopypasta()">E-form handled with number</button>
      <button class="buttonDiv" onclick="sitaEformHandledCopypasta()">SITA E-form handled</button>
    </div>
    <div>
      <input type="text" id="eformCopypastaInput" placeholder="HLSUPPORT">
    </div>
  </section>


  <!-- -------------------- -->
  <!-- Mailboxes copypastas -->
  <!-- -------------------- -->

  <section class="section">
    <h4 style="position: absolute; top: -20px; left: 1px;">Mailboxes copypasta</h4>
    
    <!-- Toggle buttons -->
    <div style="float: left;">
      <div class="mailbox_copypastas_privileges">
        <div class="grant">GRANT</div>
        <button id="mailbox_copypastas_grantFullAccessButton" onclick="mailboxesCopypasta.privilegeToggle(event);">Full Access</button>
        <button id="mailbox_copypastas_grantSendAsButton" onclick="mailboxesCopypasta.privilegeToggle(event);">Send As</button>
        <button id="mailbox_copypastas_grantSendOnBehalfButton" onclick="mailboxesCopypasta.privilegeToggle(event);">Send on Behalf</button>
      </div>
      <div style="margin: 0; padding: 0;"></div>
      <div class="mailbox_copypastas_privileges">
        <div class="revoke">REVOKE</div>
        <button id="mailbox_copypastas_revokeFullAccessButton" onclick="mailboxesCopypasta.privilegeToggle(event);">Full Access</button>
        <button id="mailbox_copypastas_revokeSendAsButton" onclick="mailboxesCopypasta.privilegeToggle(event);">Send As</button>
        <button id="mailbox_copypastas_revokeSendOnBehalfButton" onclick="mailboxesCopypasta.privilegeToggle(event);">Send on Behalf</button>
      </div>
      <div style="margin: 0; padding: 0;"></div>
      <div class="mailbox_copypastas_privileges right">
        <button id="mailbox_copypastas_cloudButton" class=" active" onclick="mailboxesCopypasta.privilegeToggle(event);">Cloud</button>
        <button id="mailbox_copypastas_onpremButton" onclick="mailboxesCopypasta.privilegeToggle(event);">On-prem</button>
      </div>
    </div>
    <div style="clear: both; height: 20px;"></div>
    
    <input type="text" placeholder="alias" id="mailboxesCopypasta_alias">
    <textarea 
      style="resize: none;" rows="8" cols="20" placeholder="users" id="mailboxesCopypasta_users" 
      onchange="mailboxesCopypasta.textareaOnchange()"></textarea>
    <button onclick="mailboxesCopypasta.getCopyPasta()">Craft & copy</button>
    <button onclick="mailboxesCopypasta.clear()">Clear</button>
    <p style="font-size: small;" id="mailboxesCopypasta_usersGotList"></p>
    
    <div style="display: flex;">
      <button class="buttonDiv" onclick="mailboxesCopypasta.getCopypasta_commands(event, 'grantFullAccessNoAutomapping')">Grant Full Access w/o Automapping</button>
      <!--button class="buttonDiv" onclick="mailboxesCopypasta.getCopypasta_commands(event, 'grantFullAccessWithAutomapping')">Grant Full Access with Automapping</button-->
      <button class="buttonDiv" onclick="mailboxesCopypasta.getCopypasta_commands(event, 'revokeFullAccess')">Revoke Full Access</button>
      <button class="buttonDiv" style="background-color: coral;" onclick="mailboxesCopypasta.getCopypasta_commands(event, 'grandSendAsOnprem')"><span style="color: green;">Grant</span> Send As on-prem</button>
      <button class="buttonDiv" style="background-color: aqua;"onclick="mailboxesCopypasta.getCopypasta_commands(event, 'grandSendAsCloud')">Grant Send As cloud</button>
      <button class="buttonDiv" style="background-color: coral;"onclick="mailboxesCopypasta.getCopypasta_commands(event, 'revokeSendAsOnprem')"><span style="color: rgb(138, 0, 0);">Revoke</span> Send As on-prem</button>
      <button class="buttonDiv" style="background-color: aqua;" onclick="mailboxesCopypasta.getCopypasta_commands(event, 'revokeSendAsCloud')">Revoke Send As cloud</button>
      <button class="buttonDiv" onclick="mailboxesCopypasta.getCopypasta_commands(event, 'grantSendOnBehalf')">Grant Send On Behalf</button>
      <button class="buttonDiv" onclick="mailboxesCopypasta.getCopypasta_commands(event, 'revokeSendOnBehalf')">Revoke Send On Behalf</button>
    </div>

    <div>
      <textarea id="mailboxesCopypasta_commandResultViewWindow"
        rows="12" placeholder="commands will appear here..." style="width: 90%; resize: vertical;"></textarea>
    </div>

  </section>











  <script>
    //
    //  GLOBALS AND FUNCTIONS
    //
    const constDate = new Date();
    let generalUrl_ticketNumber = document.getElementById("generalUrl_ticketNumber");
    generalUrl_ticketNumber.addEventListener('focus', () => generalUrl_ticketNumber.select());

    //
    //  OBJECTS SECTION
    //
    /* mailboxesCopypasta */
    let mailboxesCopypasta = {
      textarea: document.getElementById("mailboxesCopypasta_users"),
      foundUsers: document.getElementById("mailboxesCopypasta_usersGotList"),
      aliasInput: document.getElementById("mailboxesCopypasta_alias"),
      viewWindow: document.getElementById("mailboxesCopypasta_commandResultViewWindow"),
      /* toggle buttons*/
      buttonMap: new Map([
        ["mailbox_copypastas_grantFullAccessButton", {element: document.getElementById("mailbox_copypastas_grantFullAccessButton"), state: false}],
        ["mailbox_copypastas_grantSendAsButton", {element: document.getElementById("mailbox_copypastas_grantSendAsButton"), state: false}],
        ["mailbox_copypastas_grantSendOnBehalfButton", {element: document.getElementById("mailbox_copypastas_grantSendOnBehalfButton"), state: false}],
        ["mailbox_copypastas_revokeFullAccessButton", {element: document.getElementById("mailbox_copypastas_revokeFullAccessButton"), state: false}],
        ["mailbox_copypastas_revokeSendAsButton", {element: document.getElementById("mailbox_copypastas_revokeSendAsButton"), state: false}],
        ["mailbox_copypastas_revokeSendOnBehalfButton", {element: document.getElementById("mailbox_copypastas_revokeSendOnBehalfButton"), state: false}],
        ["mailbox_copypastas_cloudButton", {element: document.getElementById("mailbox_copypastas_cloudButton"), state: false}],
        ["mailbox_copypastas_onpremButton", {element: document.getElementById("mailbox_copypastas_onpremButton"), state: false}],
      ]),
      /* non-DOM properties*/
      filteredUsersArray: [],
      readableList: "",
      commandList: "",

      getUsersArray() {
        users = this.textarea.value.trim();
        users = users.replaceAll(",", "");
        users = users.replaceAll("\t", " ");
        users = users.replaceAll("\r", "");
        users = users.replaceAll("\n", " ");
        let usersArray = users.split(" ");
        this.filteredUsersArray.splice(0, this.filteredUsersArray.length);
        usersArray.forEach(element => {
          if (element && element.length > 0) {
            this.filteredUsersArray.push(element);
          }
        });
      },

      getUsersAsReadableList() {
        this.readableList = "";
        this.filteredUsersArray.forEach(element => {
          this.readableList += "\"" + element + "\" ";
        });
        this.readableList.trim();
      },

      writeFilteredUsers() {
        this.foundUsers.innerHTML = this.readableList;
      },

      textareaOnchange() {
        this.getUsersArray();
        this.getUsersAsReadableList();
        this.writeFilteredUsers();
      },

      privilegeToggle(button) {
        //console.log(button.target.id);
        dom = this.buttonMap.get(button.target.id).element;
        //console.log(dom);
        if (dom.className.includes(" active")) {         
          dom.className = dom.className.replace(" active", "");
        } else {
          dom.className += " active";
        }
      },

      getCopyPasta() {
        let generatedText;
        let alias = this.aliasInput.value.trim();
        
        if (this.filteredUsersArray.length > 1) {
          generatedText = "Users ";
          this.filteredUsersArray.forEach(element => {  
            generatedText += element + ", ";
          })
          generatedText = generatedText.slice(0, generatedText.length - 2);
          generatedText += " were added to the " + alias + " mailbox.";
        } else {
          generatedText = "User " + this.filteredUsersArray[0] + " was added to the " + alias + " mailbox.";
        }
        console.log(generatedText);
        
        navigator.clipboard.writeText(generatedText);
        showSnackbar();
      },

      getCopypasta_commands(evt, privilege) {
        let alias = this.aliasInput.value.trim();
        this[privilege] = "";
        this.filteredUsersArray.forEach((user) => {
          this[privilege] += this.getCopypasta_getSingleCommand(privilege, alias, user);
        });
        if (evt.shiftKey) {
          this.commandList += this[privilege];
        } else {
          this.commandList = this[privilege];
        }
        this.viewWindow.value = this.commandList;
        navigator.clipboard.writeText(this.commandList);
        showSnackbar();
      },

      getCopypasta_getSingleCommand(privilege, alias, user) {
        if (privilege == "grantFullAccessNoAutomapping") {
          return `Add-MailboxPermission -Identity '${alias}' -User '${user}' -AccessRights 'FullAccess' -AutoMapping:$false -Confirm:$false\r\n`;
        }
        if (privilege == "grantFullAccessWithAutomapping") {
          return `Add-MailboxPermission -Identity '${alias}' -User '${user}' -AccessRights 'FullAccess' -AutoMapping:$true -Confirm:$false\r\n`;
        }
        if (privilege == "revokeFullAccess") {
          return `Remove-MailboxPermission -Identity '${alias}' -User '${user}' -AccessRights 'FullAccess' -Confirm:$false\r\n`;
        }
        if (privilege == "grandSendAsOnprem") {
          return `Get-Mailbox '${alias}' | Add-ADPermission -User '${user}' -ExtendedRights 'Send As' -Confirm:$false\r\n`;
        }
        if (privilege == "grandSendAsCloud") {
          return `Add-RecipientPermission '${alias}' -Trustee '${user}' -AccessRights 'SendAs' -confirm:$false\r\n`;
        }
        if (privilege == "revokeSendAsOnprem") {
          return `Get-Mailbox '${alias}' | Remove-ADPermission -User '${user}' -ExtendedRights 'Send As' -confirm:$false\r\n`;
        }
        if (privilege == "revokeSendAsCloud") {
          return `Remove-RecipientPermission '${alias}' -Trustee '${user}' -AccessRights 'SendAs' -confirm:$false\r\n`;
        }
        if (privilege == "grantSendOnBehalf") {
          return `Set-Mailbox '${alias}' -Grantsendonbehalfto @{add='${user}'} -confirm:$false\r\n`;
        }
        if (privilege == "revokeSendOnBehalf") {
          return `Set-Mailbox '${alias}' -Grantsendonbehalfto @{remove='${user}'} -confirm:$false\r\n`;
        }
      },

      clear() {
        this.textarea.value = "";
        this.foundUsers.innerHTML = "";
        this.aliasInput.value = "";
        this.viewWindow.value = "";
        this.filteredUsersArray.splice(0, this.filteredUsersArray.length);
        this.readableList = "";
        this.commandList = "";
      }
    }

    /* ticketCopypasta */
    let ticketCopypasta = {
      urlInput: document.getElementById("generalUrl"),
      ticketField: document.getElementById("generalUrl_ticketNumber"),
      summaryInput: document.getElementById("ticketSummary"),
      commentInput: document.getElementById("excelComment"),
      statusDropdown: document.getElementById("ticketStatusDropdown"),
      sourceDropdown: document.getElementById("ticketSourceDropdown"),

      saveTicketNumber() {
        navigator.clipboard.writeText(this.ticketField.value);
        showSnackbar();
      },

      parseLink() {
        let reg = /HLSUPPORT-\d*/i;
        var matches = this.urlInput.value.match(reg);
        if (matches && matches.length) {
          document.getElementById("generalUrl_ticketNumber").value = matches[0];
          document.getElementById("eformCopypastaInput").value = matches[0];
        }
      },

      copyToMyExcel() {
        let url = this.urlInput.value;
        let summary = this.summaryInput.value;
        let status = this.statusDropdown.value;
        if (status == "hold") {status = "waiting";}
        if (status == "vendor") {status = "waiting";}
        let comment = this.commentInput.value;
        navigator.clipboard.writeText(`${url}\t${summary}\t${status}\t${comment}`);
        showSnackbar();
      },

      copyToTheirExcel() {
        // Generate date
        let hours = constDate.getHours();
        let year = constDate.getFullYear();
        let month = hours < 6 && constDate.getDate() == 1 ? constDate.getMonth() : constDate.getMonth() + 1;
        let day = hours < 6 ? constDate.getDate() - 1 : constDate.getDate();
        
        day = day.toString().padStart(2, '0');
        month = month.toString().padStart(2, '0');

        let ticketNumber = this.ticketField.value;
        let date = `${year}.${month}.${day}`;
        let summary = this.summaryInput.value;
        let source = this.sourceDropdown.value;
        let status = this.statusDropdown.value;
        if (status == "resolved") {status = "Resolved.";}
        if (status == "waiting") {status = "Waiting for Customer";}
        if (status == "transferred") {status = "Transferred";}
        if (status == "inprog") {status = "In progres";}
        if (status == "queued") {status = "Open";}
        if (status == "assist") {status = "In progres";}
        if (status == "hold") {status = "Hold";}
        if (status == "vendor") {status = "Pending on Vendor";}
        let comment = this.commentInput.value;
        navigator.clipboard.writeText(`${ticketNumber}\t${date}\t${summary}\t${source}\t${status}\t${comment}`);
        showSnackbar();
      },

      clear() {
        this.urlInput.value = "";
        this.ticketField.value = "";
        this.summaryInput.value = "";
        this.commentInput.value = "";
        document.getElementById("eformCopypastaInput").value = "";
      },

      clearAll() {
        this.clear();
        mailboxesCopypasta.clear();
      }
    }

    //
    //  FUNCTIONS
    //
    function showSnackbar() {
      var x = document.getElementById("snackbar");
      x.className = "show";
      // After 3 seconds, remove the show class from DIV
      setTimeout(function(){ x.className = x.className.replace("show", ""); }, 400);
    } 
    
    function eformHandledCopypasta() {
      navigator.clipboard.writeText(
        "-------------------------\r\nRequest has been handled.\r\n\r\nKind regards\r\nMarcin Kazmierczak\r\nITSD Hapag Lloyd\r\n-------------------------"
      );
      showSnackbar();
    }

    function sitaEformHandledCopypasta() {
      let x = document.getElementById("eformCopypastaInput").value;
      let reg = /HLSUPPORT-\d*/i;
      var matches = x.match(reg);
      navigator.clipboard.writeText(
        "-------------------------\r\nRequest has been forwarded to SITA in "+matches[0].toUpperCase()+".\r\n\r\nKind regards\r\nMarcin Kazmierczak\r\nITSD Hapag Lloyd\r\n-------------------------"
      );
      showSnackbar();
    }

    function eformWithNumberHandledCopypasta() {
      let x = document.getElementById("eformCopypastaInput").value;
      let reg = /HLSUPPORT-\d*/i;
      var matches = x.match(reg);
      navigator.clipboard.writeText(
        "-------------------------\r\nRequest has been handled in "+matches[0].toUpperCase()+".\r\n\r\nKind regards\r\nMarcin Kazmierczak\r\nITSD Hapag Lloyd\r\n-------------------------"
      );
      showSnackbar();
    }
    mailboxesCopypasta.textareaOnchange()
    // window.onload = (event) => {mailboxesCopypasta.textareaOnchange()};
  </script>
</body>
</html>
